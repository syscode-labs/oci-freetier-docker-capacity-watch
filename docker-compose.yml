services:
  watcher:
    build: .
    container_name: oci-freetier-capacity-watcher
    restart: unless-stopped
    environment:
      OCI_PROFILE: ${OCI_PROFILE}
      OCI_CONFIG_FILE: /run/oci/config
      COMPARTMENT_NAME: ${COMPARTMENT_NAME:-oci-free-tier-dedicated}
      RETRY_SECONDS: ${RETRY_SECONDS:-300}
      MAX_ATTEMPTS: ${MAX_ATTEMPTS:-0}
      VM_PROFILE_FILE: /app/worker/terraform.tfvars.example
      SSH_KEY_FILE: /run/keys/ssh_public_key.pub
      STATE_DIR: /state
      NOTIFY_BACKEND: ${NOTIFY_BACKEND:-none}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      UNRAID_NOTIFY_CMD: /usr/local/bin/unraid-notify
    volumes:
      - ${OCI_MOUNT_DIR}:/run/oci:ro
      - ${SSH_PUBLIC_KEY_FILE}:/run/keys/ssh_public_key.pub:ro
      - ./state:/state
      - ${VM_PROFILE_SOURCE_FILE}:/app/worker/terraform.tfvars.example:ro
      - ${UNRAID_NOTIFY_BIN:-/dev/null}:/usr/local/bin/unraid-notify:ro
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
